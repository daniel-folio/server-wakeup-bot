name: Sync to A Repository

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout B Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare publish directory (exclude internal sync workflow)
        run: |
          mkdir -p publish
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github/workflows/sync-to-a.yml' \
            ./ publish/

      - name: Commit and push to A/main using PAT (plain git)
        run: |
          cd publish
          git init
          git config user.name "daniel-works0001"
          git config user.email "daniel.han.works0001@gmail.com"
          git add -A
          git commit -m "deploy(sync): mirror from B @ $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git branch -M main
          git remote add origin https://${{ secrets.WORKS0001_REPO_PAT }}@github.com/daniel-works0001/server-wakeup-bot.git
          git push -u origin main --force

      - name: Commit and push to daniel-dataflow using PAT
        run: |
          cd publish
          git config user.name "daniel-dataflow"
          git config user.email "daniel.dataflow@gmail.com"
          git commit --amend --reset-author --no-edit
          git remote add dataflow https://${{ secrets.DATAFLOW_REPO_PAT }}@github.com/daniel-dataflow/server-wakeup-bot.git
          git push -u dataflow main --force